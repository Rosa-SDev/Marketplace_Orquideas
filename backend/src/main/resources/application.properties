spring.application.name=proyecto-orquideas

spring.config.import=optional:classpath:application-local.properties

# Base de datos
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA y Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Wompi
wompi.public-key=${WOMPI_PUBLIC_KEY}
wompi.private-key=${WOMPI_PRIVATE_KEY}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Informacion contacto whatsapp
contacto.whatsapp.numero=${WHATSAPP_NUMERO}
contacto.whatsapp.mensaje=${WHATSAPP_MENSAJE}

# Server
server.port=8080
